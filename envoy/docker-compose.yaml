version: "3"

services:
  app:
    build:
      context: ./app
    networks:
      - internal
  envoy:
    image: envoyproxy/envoy:v1.11.2
    command: envoy -c "/config.yaml"
    ports:
      - "9901:9901"
      - "51051:51051"
    volumes:
      - ./envoy/config.yaml:/config.yaml
      - ./app/proto:/proto
    depends_on:
      - app
    networks:
      - internal

networks:
  internal:
